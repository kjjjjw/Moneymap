<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#5945ce">
<title>가계부 지출 입력</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <img class="brand-mark" src="icons/logo.png" alt="" width="38" height="38">
      <div class="brand-text">
        <h1>준우 <span class="heart">💕</span> 소히</h1>
        <p class="brand-sub">우리집 재정 로드맵</p>
      </div>
    </div>
    <div class="top-actions">
      <button type="button" id="installBtn" class="install-btn" hidden>앱 설치</button>
      <div id="authArea"></div>
    </div>
  </header>

  <main id="mainArea" hidden>
    <nav class="tabs" id="tabs">
      <button type="button" class="tab-btn is-active" data-tab="entry">작성하기</button>
      <button type="button" class="tab-btn" data-tab="summary">계획 대비 실적</button>
    </nav>

    <div id="tab-entry" class="tab-panel">
      <div class="mode-toggle" id="modeToggle">
        <button type="button" class="mode-btn is-active" data-mode="expense">지출</button>
        <button type="button" class="mode-btn" data-mode="income">소득 · 저축</button>
      </div>

      <form id="entryForm" class="card">
        <p id="editBanner" class="edit-banner" hidden></p>

        <div class="field">
          <label for="date">날짜</label>
          <input type="date" id="date" required>
        </div>

        <div class="field">
          <label for="major">대분류</label>
          <select id="major" required></select>
        </div>

        <div class="field" id="minorField">
          <label for="minor">소분류</label>
          <select id="minor" required></select>
        </div>

        <div class="field">
          <label for="detail">세부항목</label>
          <select id="detail" required></select>
        </div>

        <div class="field">
          <label for="memo">상세 (메모)</label>
          <input type="text" id="memo" placeholder="예: 이마트 장보기">
        </div>

        <div class="field">
          <label for="amount" id="amountLabel">이용금액 (원)</label>
          <input type="text" id="amount" inputmode="numeric" autocomplete="off" required placeholder="예: 15,000">
        </div>

        <button type="submit" id="submitBtn">입력</button>
        <button type="button" id="cancelEditBtn" class="secondary-btn" hidden>수정 취소</button>
        <p id="statusMsg" class="status" role="status"></p>
      </form>

      <section class="card recent">
        <div class="recent-header">
          <h2 id="recentTitle">지출 내역</h2>
          <button type="button" id="refreshBtn" class="linklike">새로고침</button>
        </div>
        <div class="recent-filter">
          <select id="recentMonth" aria-label="월 선택">
            <option value="">전체 기간</option>
          </select>
        </div>
        <ul id="recentList" class="recent-list"></ul>
        <button type="button" id="moreBtn" class="secondary-btn more-btn" hidden>더 보기</button>
        <p id="listMeta" class="list-meta" role="status"></p>
      </section>
    </div>

    <div id="tab-summary" class="tab-panel" hidden>
      <section class="card summary">
        <div class="summary-controls">
          <select id="summaryMode">
            <option value="month">월별</option>
            <option value="year">연도 합계</option>
          </select>
          <select id="summaryYear"></select>
          <select id="summaryMonth"></select>
          <button type="button" id="summaryRefreshBtn" class="linklike">새로고침</button>
        </div>

        <div id="summaryNet" class="summary-net"></div>
        <div id="summaryBody" class="summary-body">
          <p class="muted">불러오는 중...</p>
        </div>
      </section>
    </div>
  </main>

  <section id="loginArea" class="card login-card">
    <img class="login-mark" src="icons/char-login.png" alt="" width="120" height="120">
    <h2 class="login-title">준우 <span class="heart">💕</span> 소히</h2>
    <p class="login-desc">Microsoft 계정으로 로그인하면 OneDrive의 가계부와 연결됩니다.</p>
    <button type="button" id="loginBtn">Microsoft 계정으로 로그인</button>
    <p id="loginError" class="status error"></p>
  </section>
</div>

<div id="toast" class="toast" hidden aria-live="polite">
  <img id="toastImg" class="toast-img" src="" alt="">
  <span id="toastText" class="toast-text"></span>
</div>

<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.4/lib/msal-browser.min.js"></script><script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
